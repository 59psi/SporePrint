[platformio]
default_envs = node_esp32

# ── Shared ESP32 device settings ────────────────────────────────
# Device envs extend this section. It is deliberately NOT the [env] base so
# the native (host) test env doesn't inherit a board/platform it can't use.
#
# Pin to the official platformio/espressif32 6.13.0 release (Arduino-ESP32
# core 2.x). The v2 code uses the core-2.x ledc API (`ledcSetup` +
# `ledcAttachPin`); audit those call sites before any platform bump that
# carries core 3.x.
#
# C++ dialect is gnu++17 image-wide: the v2 libraries are C++17 and the
# ESP32 core headers rely on GNU extensions (typeof) that a strict
# -std=c++17 disables.
#
# Partition tables ship a coredump slot (v2 keeps the v1 4 MB layout
# byte-identical for OTA fleet continuity; S3 gets its own 8 MB table).
#
# Build flags:
#   SPOREPRINT_FW_VERSION — written by scripts/bump.sh from VERSION.txt so
#   the Pi/cloud can detect OTA drift in heartbeats. The release workflow
#   exports it from the firmware-v* tag. (v1's PROVISION_HMAC build flag is
#   gone — v2 provisions all secrets via the captive portal.)
[esp32_base]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I boards
    -DSPOREPRINT_FW_VERSION='"${sysenv.SPOREPRINT_FW_VERSION}"'

# ── v2 unified node ─────────────────────────────────────────────
# One image replaces the v1 climate/relay/lighting trio: the channel-bank
# personality is provisioned via the captive portal and the I²C sensor set
# autodetects at boot.
[env:node_esp32]
extends = esp32_base
build_src_filter = +<node/>

[env:node_esp32s3]
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.partitions = partitions_8mb.csv
build_src_filter = +<node/>
build_flags =
    ${esp32_base.build_flags}
    -DSP_BOARD_ESP32S3

# ── Camera (AI-Thinker ESP32-CAM) ───────────────────────────────
[env:cam]
extends = esp32_base
board = esp32cam
build_src_filter = +<cam/>

# ── Native host tests ───────────────────────────────────────────
# Runs the sp_core + sp_drivers suites on the host — no ESP32, no Arduino.
# `pio test -e native`. The fixture at test/fixtures/ is a byte-identical
# copy of server/tests/fixtures/signing_vectors.json, guarded by the
# bump.sh signing-fixture parity gate.
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
