[platformio]
default_envs = climate_node

[env]
# Pin to the official platformio/espressif32 6.13.0 release (Arduino-ESP32
# core 2.x). Code below is written against the 2.x ledc API
# (`ledcSetup` + `ledcAttachPin`) and the ClosedCube SHT31D 1.5 API
# (`readSerialNumber()` returns uint32_t). Do NOT bump this pin without
# first auditing those API sites — a naïve jump to a platform carrying
# core 3.x will silently break PWM on every relay + lighting channel.
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

[env:climate_node]
build_src_filter = +<climate_node/>
lib_deps =
    ${env.lib_deps}
    closedcube/ClosedCube SHT31D@^1.5
    sparkfun/SparkFun SCD4x Arduino Library@^1.1
    claws/BH1750@^1.3

[env:relay_node]
build_src_filter = +<relay_node/>
lib_deps = ${env.lib_deps}

[env:lighting_node]
build_src_filter = +<lighting_node/>
lib_deps = ${env.lib_deps}

[env:cam_node]
board = esp32cam
build_src_filter = +<cam_node/>
lib_deps = ${env.lib_deps}
