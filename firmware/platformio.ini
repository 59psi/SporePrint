[platformio]
default_envs = climate_node

[env]
# Pin to the official platformio/espressif32 6.13.0 release (Arduino-ESP32
# core 2.x). Code below is written against the 2.x ledc API
# (`ledcSetup` + `ledcAttachPin`) and the ClosedCube SHT31D 1.5 API
# (`readSerialNumber()` returns uint32_t). Do NOT bump this pin without
# first auditing those API sites — a naïve jump to a platform carrying
# core 3.x will silently break PWM on every relay + lighting channel.
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

# v3.4.9 build flags:
#   * SPOREPRINT_FW_VERSION — read from firmware/VERSION.txt, kept in sync
#     with the parent repo by scripts/bump.sh. Heartbeat emits this so the
#     cloud can detect OTA drift.
#   * SPOREPRINT_PROVISION_HMAC — optional secret, set via env when
#     flashing a node for first-boot NVS provisioning of the MQTT HMAC
#     key. Must be unset after provisioning; re-flashing without it is
#     safe because the bootstrap helper refuses to overwrite existing NVS.
#     Generated by scripts/provision-node.sh.
build_flags =
    -DSPOREPRINT_FW_VERSION='"${sysenv.SPOREPRINT_FW_VERSION}"'
    -DSPOREPRINT_PROVISION_HMAC='"${sysenv.SPOREPRINT_PROVISION_HMAC}"'

# If SPOREPRINT_FW_VERSION is unset at build time, the build will emit an
# empty string, which the heartbeat code falls back on with the
# firmware/VERSION.txt content — but baking that in at the ini level keeps
# it simple. scripts/bump.sh writes VERSION.txt AND sets the env var
# before invoking pio run, so both paths see the same value.

[env:climate_node]
build_src_filter = +<climate_node/>
lib_deps =
    ${env.lib_deps}
    closedcube/ClosedCube SHT31D@^1.5
    sparkfun/SparkFun SCD4x Arduino Library@^1.1
    claws/BH1750@^1.3

[env:relay_node]
build_src_filter = +<relay_node/>
lib_deps = ${env.lib_deps}

[env:lighting_node]
build_src_filter = +<lighting_node/>
lib_deps = ${env.lib_deps}

[env:cam_node]
board = esp32cam
build_src_filter = +<cam_node/>
lib_deps = ${env.lib_deps}

# v3.4.9 Prescription 6.3.14 — native test harness scaffold. Runs on
# the host via `pio test -e native`, no ESP32 required. Currently only a
# smoke test (see firmware/test/README.md); real canonicalize + buffer +
# clamp tests land in v3.5.0.
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
