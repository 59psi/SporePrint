services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./data/db:/data/db
      - ./data/vision:/data/vision
    environment:
      - SPOREPRINT_DATABASE_PATH=/data/db/sporeprint.db
      - SPOREPRINT_MQTT_HOST=mqtt
      - SPOREPRINT_MQTT_PORT=1883
      - SPOREPRINT_NTFY_URL=http://ntfy:80
      - SPOREPRINT_VISION_STORAGE=/data/vision
      - SPOREPRINT_WEATHER_API_KEY=${SPOREPRINT_WEATHER_API_KEY:-}
      - SPOREPRINT_WEATHER_LAT=${SPOREPRINT_WEATHER_LAT:-}
      - SPOREPRINT_WEATHER_LON=${SPOREPRINT_WEATHER_LON:-}
    depends_on:
      - mqtt
      - ntfy
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto:/mosquitto/data
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    ports:
      - "8080:80"
    volumes:
      - ./data/ntfy:/var/cache/ntfy
    command: serve
    restart: unless-stopped

  ui:
    build: ./ui
    ports:
      - "3001:80"
    depends_on:
      - server
    restart: unless-stopped
