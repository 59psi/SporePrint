services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./models:/models
      - ./docs:/docs
      - ./firmware:/firmware:ro
      - ./data/db:/data/db
      - ./data/vision:/data/vision
    environment:
      - SPOREPRINT_DATABASE_PATH=/data/db/sporeprint.db
      - SPOREPRINT_MQTT_HOST=mqtt
      - SPOREPRINT_MQTT_PORT=1883
      - SPOREPRINT_MQTT_USERNAME=${SPOREPRINT_MQTT_USERNAME:-}
      - SPOREPRINT_MQTT_PASSWORD=${SPOREPRINT_MQTT_PASSWORD:-}
      - SPOREPRINT_NTFY_URL=http://ntfy:80
      - SPOREPRINT_VISION_STORAGE=/data/vision
      - SPOREPRINT_WEATHER_PROVIDER=${SPOREPRINT_WEATHER_PROVIDER:-openmeteo}
      - SPOREPRINT_CLAUDE_API_KEY=${SPOREPRINT_CLAUDE_API_KEY:-}
      - SPOREPRINT_WEATHER_API_KEY=${SPOREPRINT_WEATHER_API_KEY:-}
      - SPOREPRINT_WEATHER_LAT=${SPOREPRINT_WEATHER_LAT:-}
      - SPOREPRINT_WEATHER_LON=${SPOREPRINT_WEATHER_LON:-}
      - SPOREPRINT_WEATHER_POLL_MINUTES=${SPOREPRINT_WEATHER_POLL_MINUTES:-10}
      - SPOREPRINT_API_KEY=${SPOREPRINT_API_KEY:-}
      - SPOREPRINT_ALLOW_UNAUTHENTICATED=${SPOREPRINT_ALLOW_UNAUTHENTICATED:-false}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      mqtt:
        condition: service_healthy
      ntfy:
        condition: service_healthy
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    # Broker is LAN-internal — firmware nodes connect from inside the local
    # network with credentials. Bind only to the host's LAN interface; never
    # expose the broker to the public internet.
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - ./config/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./data/mosquitto:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 2 >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    ports:
      - "8080:80"
    volumes:
      - ./data/ntfy:/var/cache/ntfy
    command: serve
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  ui:
    build: ./ui
    ports:
      - "3001:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
