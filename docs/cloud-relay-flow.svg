<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <marker id="arrowDownRelay" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="none" stroke="#34d399" stroke-width="1.5"/>
    </marker>
    <marker id="arrowUpRelay" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    </marker>
    <marker id="arrowRightRelay" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#34d399" stroke-width="1.5"/>
    </marker>
    <marker id="arrowRightRelayAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    </marker>
    <linearGradient id="relayGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Cloud Relay Architecture</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Remote access flow  |  Phone to Pi via sporeprint.ai</text>

  <!-- ═══════════ MOBILE APP (top) ═══════════ -->
  <rect x="250" y="70" width="300" height="80" rx="8" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="250" y="70" width="300" height="3" rx="1.5" fill="#60a5fa" opacity="0.6"/>

  <!-- Phone icon (simplified) -->
  <rect x="272" y="86" width="24" height="40" rx="4" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <line x1="280" y1="118" x2="290" y2="118" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>

  <text x="310" y="100" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Mobile App</text>
  <text x="310" y="118" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">iOS / Android  |  Capacitor</text>
  <text x="310" y="136" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Supabase JWT  |  RevenueCat tier</text>

  <!-- Arrow down: Mobile → Cloud -->
  <line x1="370" y1="150" x2="370" y2="184" stroke="#34d399" stroke-width="2" marker-end="url(#arrowDownRelay)"/>
  <line x1="430" y1="194" x2="430" y2="160" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowUpRelay)"/>
  <text x="400" y="176" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">JWT Auth</text>

  <!-- ═══════════ CLOUD RELAY (center) ═══════════ -->
  <rect x="100" y="200" width="600" height="260" rx="10" fill="url(#relayGlow)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="100" y="200" width="600" height="4" rx="2" fill="#34d399" opacity="0.5"/>

  <!-- Cloud label -->
  <text x="130" y="226" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Cloud Relay</text>
  <text x="282" y="226" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">sporeprint.ai  |  FastAPI + Socket.IO  |  Railway</text>

  <!-- Auth module -->
  <rect x="120" y="240" width="170" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="205" y="262" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Auth</text>
  <text x="205" y="278" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Supabase JWT verification</text>
  <text x="205" y="290" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Device token auth (Pi)</text>

  <!-- Tier Gate module -->
  <rect x="300" y="240" width="194" height="56" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="397" y="262" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Tier Gate</text>
  <text x="397" y="280" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Free = read-only telemetry</text>
  <text x="397" y="292" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Premium = full control</text>

  <!-- WebSocket Relay module -->
  <rect x="504" y="240" width="180" height="56" rx="6" fill="#1a1a2e" stroke="#34d399" stroke-width="1"/>
  <text x="594" y="262" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">WebSocket Relay</text>
  <text x="594" y="278" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Pi rooms + client subscriptions</text>
  <text x="594" y="290" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Bidirectional proxy</text>

  <!-- Push module -->
  <rect x="120" y="308" width="170" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="205" y="330" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Push Notifications</text>
  <text x="205" y="346" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">FCM to APNs (iOS)</text>
  <text x="205" y="358" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">FCM to Android</text>

  <!-- Alert Escalation module -->
  <rect x="300" y="308" width="194" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="397" y="330" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Alert Rules</text>
  <text x="397" y="346" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">12 notification types</text>
  <text x="397" y="358" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Quiet hours  |  4 categories</text>

  <!-- AI module -->
  <rect x="504" y="308" width="180" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="594" y="330" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">AI Vision</text>
  <text x="594" y="346" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Claude API  |  BYOK</text>
  <text x="594" y="358" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Grow advisor  |  Rate limited</text>

  <!-- Metrics + Subscriptions bar -->
  <rect x="120" y="376" width="564" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="0.8"/>
  <text x="205" y="398" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Metrics Ingest</text>
  <circle cx="290" cy="395" r="2" fill="#334155"/>
  <text x="350" y="398" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Health Monitoring</text>
  <circle cx="420" cy="395" r="2" fill="#334155"/>
  <text x="484" y="398" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Subscriptions</text>
  <circle cx="540" cy="395" r="2" fill="#334155"/>
  <text x="610" y="398" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Data Export</text>

  <!-- Services sidebar (right) -->
  <rect x="720" y="240" width="60" height="172" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="0.5" opacity="0.7"/>
  <text x="750" y="258" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Services</text>
  <text x="750" y="280" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Supabase</text>
  <text x="750" y="298" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Firebase</text>
  <text x="750" y="316" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">RevenueCat</text>
  <text x="750" y="334" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Anthropic</text>
  <text x="750" y="352" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Resend</text>
  <text x="750" y="370" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Sentry</text>
  <text x="750" y="388" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Railway</text>
  <text x="750" y="406" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">Cloudflare</text>

  <!-- Arrow down: Cloud → Pi -->
  <line x1="370" y1="460" x2="370" y2="496" stroke="#34d399" stroke-width="2" marker-end="url(#arrowDownRelay)"/>
  <line x1="430" y1="490" x2="430" y2="464" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowUpRelay)"/>
  <text x="340" y="484" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Commands</text>
  <text x="462" y="484" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="9">Telemetry</text>

  <!-- ═══════════ PI SERVER (bottom) ═══════════ -->
  <rect x="200" y="504" width="400" height="72" rx="8" fill="#1a1a2e" stroke="#34d399" stroke-width="1.5"/>
  <rect x="200" y="504" width="400" height="3" rx="1.5" fill="#34d399" opacity="0.6"/>

  <!-- Pi icon -->
  <rect x="222" y="520" width="30" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <text x="237" y="540" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">Pi</text>

  <text x="268" y="530" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Pi Server</text>
  <text x="268" y="548" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Local network  |  FastAPI  |  SQLite  |  MQTT broker</text>
  <text x="268" y="566" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Cloud connector  |  device_token auth to relay</text>

  <!-- Arrow down: Pi → Hardware -->
  <line x1="400" y1="576" x2="400" y2="612" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowDownRelay)"/>
  <text x="400" y="600" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">MQTT</text>

  <!-- ═══════════ HARDWARE (bottom) ═══════════ -->
  <rect x="130" y="620" width="540" height="56" rx="8" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="130" y="620" width="540" height="3" rx="1.5" fill="#fbbf24" opacity="0.6"/>

  <text x="400" y="644" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Hardware  (ESP32 Nodes)</text>
  <text x="400" y="664" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Climate  |  Relay/SSR  |  Lighting  |  Camera  |  Smart Plugs</text>

  <!-- Left side: Local access path annotation -->
  <rect x="20" y="504" width="160" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="0.8" opacity="0.7"/>
  <text x="100" y="522" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Local Access</text>
  <text x="100" y="538" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">WiFi direct to Pi</text>
  <text x="100" y="552" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">No cloud needed</text>

  <!-- Right side: Tailscale path annotation -->
  <rect x="620" y="504" width="160" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="0.8" opacity="0.7"/>
  <text x="700" y="522" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Tailscale (Free)</text>
  <text x="700" y="538" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Self-setup VPN</text>
  <text x="700" y="552" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Direct P2P tunnel</text>

  <!-- Footer -->
  <text x="400" y="692" text-anchor="middle" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="9">SporePrint  |  sporeprint.ai</text>
</svg>