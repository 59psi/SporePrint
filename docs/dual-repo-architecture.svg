  <text x="165" y="350" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Python  |  FastAPI  |  Socket.IO</text>
  <text x="165" y="364" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Relay  |  Auth  |  Push  |  AI</text>
