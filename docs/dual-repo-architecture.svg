  <text x="635" y="364" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Split-pane layouts  |  Data tables</text>
  <text x="635" y="378" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">KPI cards  |  Analytics charts</text>
  <text x="635" y="392" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Served at sporeprint.ai/app/</text>

