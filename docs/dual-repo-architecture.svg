  <line x1="440" y1="260" x2="440" y2="220" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowUpDual)"/>
  <text x="490" y="240" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">@sporeprint/* imports</text>

