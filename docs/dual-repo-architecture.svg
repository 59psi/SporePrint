  <text x="165" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Python  |  FastAPI</text>
  <text x="165" y="164" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">17 modules  |  80+ endpoints</text>
  <text x="165" y="178" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">SQLite  |  MQTT  |  Socket.IO</text>
  <text x="165" y="192" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Telemetry  |  Sessions  |  Vision</text>

