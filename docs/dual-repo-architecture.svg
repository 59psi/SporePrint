  <text x="95" y="96" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">PUBLIC</text>

  <text x="142" y="96" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">sporeprint</text>
  <text x="260" y="96" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Open Source  |  MIT License</text>

  <!-- Server box -->
