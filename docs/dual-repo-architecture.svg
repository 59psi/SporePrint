  <text x="213" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Railway</text>
  <circle cx="264" cy="425" r="2" fill="#334155"/>
  <text x="280" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">RevenueCat</text>
  <circle cx="349" cy="425" r="2" fill="#334155"/>
  <text x="365" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Firebase FCM</text>
  <circle cx="440" cy="425" r="2" fill="#334155"/>
  <text x="456" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Claude AI</text>
  <circle cx="512" cy="425" r="2" fill="#334155"/>
  <text x="528" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Resend</text>
  <circle cx="571" cy="425" r="2" fill="#334155"/>
  <text x="587" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Sentry</text>
  <circle cx="627" cy="425" r="2" fill="#334155"/>
  <text x="643" y="428" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Cloudflare</text>

  <!-- Tier labels -->
  <rect x="60" y="456" width="90" height="22" rx="4" fill="#34d399" opacity="0.1" stroke="#34d399" stroke-width="0.5"/>
  <text x="105" y="471" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Free Tier</text>

  <text x="163" y="471" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Local control, Tailscale remote, ntfy push</text>

  <rect x="440" y="456" width="100" height="22" rx="4" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="490" y="471" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Premium Tier</text>

  <text x="553" y="471" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Cloud relay, full remote control, AI, native push</text>

  <!-- Footer -->
  <text x="400" y="494" text-anchor="middle" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="9">SporePrint  |  sporeprint.ai</text>
