  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Open-source core + commercial cloud layer</text>

  <!-- ═══════════ PUBLIC REPO ═══════════ -->
  <rect x="40" y="68" width="720" height="148" rx="10" fill="url(#publicGrad)" stroke="#34d399" stroke-width="1.5" stroke-dasharray="0"/>
  <rect x="40" y="68" width="720" height="4" rx="2" fill="#34d399" opacity="0.5"/>

  <!-- Public badge -->
