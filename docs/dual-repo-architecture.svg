  <text x="400" y="350" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Capacitor  |  iOS  |  Android</text>
  <text x="400" y="364" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Server discovery  |  Offline cache</text>
  <text x="400" y="378" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Push notifications  |  IAP</text>
  <text x="400" y="392" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Premium features  |  Admin</text>

