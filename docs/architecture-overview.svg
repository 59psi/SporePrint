  <rect x="60" y="642" width="680" height="320" rx="8" fill="url(#amberFade)" stroke="#334155" stroke-width="1.5"/>
  <rect x="60" y="642" width="680" height="3" rx="1.5" fill="#fbbf24" opacity="0.6"/>

  <!-- Layer label -->
  <text x="80" y="666" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">HARDWARE</text>
  <text x="180" y="666" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Physical Layer  (ESP32 Nodes)</text>

  <!-- Climate Node -->
  <rect x="80" y="680" width="316" height="114" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="238" y="702" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Climate Sensors</text>
  <rect x="96" y="714" width="130" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="161" y="733" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">SHT31 Temp/RH</text>
  <rect x="236" y="714" width="144" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="308" y="733" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">SCD41 CO2</text>
  <rect x="96" y="752" width="130" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="161" y="771" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">BH1750 Light</text>
  <rect x="236" y="752" width="144" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="308" y="771" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Optional BME280</text>

  <!-- Relay/SSR Node -->
  <rect x="408" y="680" width="312" height="114" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="564" y="702" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Relay / SSR Controller</text>
  <rect x="424" y="714" width="140" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="494" y="733" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">IRLZ44N PWM</text>
  <rect x="572" y="714" width="132" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="638" y="733" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">4-ch Fan Control</text>
  <rect x="424" y="752" width="280" height="30" rx="4" fill="#0a0a0f" stroke="#334155" stroke-width="0.5"/>
  <text x="564" y="771" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Humidifier  |  Heater  |  FAE  |  Exhaust</text>

  <!-- Camera Node -->
  <rect x="80" y="806" width="316" height="68" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="238" y="828" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">ESP32-CAM</text>
  <text x="238" y="862" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">OV2640  |  Timelapse  |  Vision pipeline</text>

  <!-- Lighting Node -->
  <rect x="408" y="806" width="312" height="68" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="564" y="828" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Lighting Controller</text>
  <text x="564" y="862" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Multi-ch PWM  |  6500K white  |  450nm blue</text>

  <!-- Smart Plugs -->
  <rect x="80" y="886" width="640" height="56" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="400" y="908" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">MQTT Smart Plugs</text>
  <text x="400" y="930" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Tasmota  |  Athom plugs  |  Power monitoring  |  On/Off scheduling</text>

  <!-- Footer -->
  <text x="400" y="982" text-anchor="middle" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="9">SporePrint v3.3.1  |  Open Source  |  github.com/59psi/SporePrint</text>
</svg>