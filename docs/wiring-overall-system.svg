<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">

  <!-- Background -->
  <rect width="1000" height="700" fill="#0a0a0f"/>

  <!-- ═══════════════════════ TITLE ═══════════════════════ -->
  <text x="500" y="30" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">SporePrint System Overview</text>
  <text x="500" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11">How all components interconnect: Pi hub, ESP32 nodes, smart plugs, browser access, cloud relay</text>

  <!-- ═══════════════════════ LEGEND ═══════════════════════ -->
  <rect x="790" y="14" width="196" height="100" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="888" y="34" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Connection Legend</text>

  <line x1="806" y1="54" x2="836" y2="54" stroke="#34d399" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="844" y="58" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">WiFi / MQTT</text>

  <line x1="806" y1="72" x2="836" y2="72" stroke="#3b82f6" stroke-width="2"/>
  <text x="844" y="76" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">HTTP / WebSocket</text>

  <line x1="806" y1="90" x2="836" y2="90" stroke="#eab308" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="844" y="94" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Cloud Relay (optional)</text>

  <line x1="806" y1="108" x2="836" y2="108" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="844" y="112" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Tailscale VPN (free tier)</text>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RASPBERRY PI (center) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="300" y="210" width="360" height="170" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <rect x="300" y="210" width="360" height="5" rx="2" fill="#34d399" opacity="0.6"/>

  <text x="480" y="240" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Raspberry Pi 5</text>
  <text x="480" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Central Hub -- All local processing, no cloud dependency</text>

  <!-- Services row 1 -->
  <rect x="318" y="278" width="156" height="30" rx="4" fill="#0a0a0f" stroke="#34d399" stroke-width="0.5"/>
  <text x="396" y="297" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">SporePrint Server</text>

  <rect x="486" y="278" width="160" height="30" rx="4" fill="#0a0a0f" stroke="#34d399" stroke-width="0.5"/>
  <text x="566" y="297" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Mosquitto MQTT :1883 (auth&apos;d, v3.3.0+)</text>

  <!-- Services row 2 -->
  <rect x="318" y="318" width="156" height="30" rx="4" fill="#0a0a0f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="396" y="337" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Web UI :3001</text>

  <rect x="486" y="318" width="160" height="30" rx="4" fill="#0a0a0f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="566" y="337" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">REST API + Socket.IO</text>

  <!-- Services row 3 -->
  <rect x="318" y="356" width="328" height="20" rx="4" fill="#0a0a0f" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="482" y="370" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="8">SQLite | Automation Rules | Vision Pipeline | Cloud Connector</text>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ESP32 NODES (semicircle above Pi) -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Climate Node -->
  <rect x="40" y="86" width="172" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
