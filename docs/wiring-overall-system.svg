  <text x="126" y="130" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">SHT31 + SCD41 + BH1750</text>
  <text x="126" y="148" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Temp, RH, CO2, Light</text>

  <path d="M 180 166 Q 290 220 340 254" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <g><rect x="222" y="190" width="90" height="18" rx="4" fill="#0f2418" stroke="#34d399" stroke-width="0.5"/>
  <text x="267" y="203" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">sporeprint/tele/#</text></g>

  <!-- Relay Node -->
  <rect x="266" y="74" width="172" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="352" y="98" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Relay Node</text>
  <text x="352" y="118" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">4x MOSFET (IRLZ44N)</text>
  <text x="352" y="136" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Fans, pump, aux</text>

  <path d="M 380 154 L 420 210" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <g><rect x="370" y="170" width="86" height="18" rx="4" fill="#0f2418" stroke="#34d399" stroke-width="0.5"/>
  <text x="413" y="183" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">sporeprint/cmd/#</text></g>

  <!-- Lighting Node -->
  <rect x="510" y="74" width="172" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="596" y="98" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Lighting Node</text>
  <text x="596" y="118" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">2-4x MOSFET, PWM</text>
  <text x="596" y="136" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">White, Blue, Red, Far-Red</text>

  <path d="M 580 154 L 540 210" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <g><rect x="520" y="170" width="86" height="18" rx="4" fill="#0f2418" stroke="#34d399" stroke-width="0.5"/>
  <text x="563" y="183" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">sporeprint/light/#</text></g>

  <!-- Camera Node -->
  <rect x="740" y="86" width="172" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="826" y="110" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Camera Node(s)</text>
  <text x="826" y="130" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">ESP32-S3 CAM (OV2640/OV5640)</text>
  <text x="826" y="148" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Auto-capture every 15min</text>

  <path d="M 775 166 Q 700 210 620 254" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <g><rect x="668" y="198" width="82" height="18" rx="4" fill="#0f2418" stroke="#34d399" stroke-width="0.5"/>
  <text x="709" y="211" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">HTTP POST /api</text></g>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SMART PLUGS (below Pi) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="80" y="428" width="148" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
