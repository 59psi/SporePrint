  <text x="154" y="490" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">AC on/off</text>

  <rect x="248" y="428" width="148" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="322" y="452" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Tasmota Plug</text>
  <text x="322" y="472" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Heater / Cooler</text>
  <text x="322" y="490" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">AC on/off</text>

  <rect x="416" y="428" width="148" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="490" y="452" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Tasmota Plug</text>
  <text x="490" y="472" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Dehumidifier</text>
  <text x="490" y="490" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">(optional, Tier 3)</text>

  <rect x="584" y="428" width="148" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="658" y="452" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Tasmota Plug</text>
  <text x="658" y="472" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Aux Appliance</text>
  <text x="658" y="490" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">(optional, Tier 3)</text>

  <!-- WiFi lines from plugs to Pi -->
  <path d="M 188 428 L 376 380" fill="none" stroke="#34d399" stroke-width="1.3" stroke-dasharray="5,3"/>
  <path d="M 350 428 L 430 380" fill="none" stroke="#34d399" stroke-width="1.3" stroke-dasharray="5,3"/>
  <path d="M 490 428 L 490 380" fill="none" stroke="#34d399" stroke-width="1.3" stroke-dasharray="5,3"/>
  <path d="M 618 428 L 550 380" fill="none" stroke="#34d399" stroke-width="1.3" stroke-dasharray="5,3"/>

  <g><rect x="378" y="396" width="100" height="18" rx="4" fill="#0f2418" stroke="#34d399" stroke-width="0.5"/>
  <text x="428" y="409" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">MQTT cmnd/POWER</text></g>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LOCAL BROWSER (bottom-left) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="40" y="530" width="280" height="94" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="40" y="530" width="280" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>
  <text x="180" y="558" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Local Browser Access</text>
  <text x="180" y="580" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">http://sporeprint.local:3001</text>
  <text x="180" y="602" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Desktop / Tablet / Phone | Full dashboard</text>

  <path d="M 250 530 L 400 380" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <g><rect x="288" y="438" width="96" height="18" rx="4" fill="#0c1a33" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="336" y="451" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">HTTP + Socket.IO</text></g>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CLOUD RELAY (right side) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="730" y="228" width="256" height="150" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="858" y="256" text-anchor="middle" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Cloud Relay (Optional)</text>
  <text x="858" y="278" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">sporeprint.ai | Premium | HMAC-signed cmds (v3.3.1+)</text>

  <rect x="748" y="294" width="220" height="28" rx="4" fill="#0a0a0f" stroke="#eab308" stroke-width="0.5"/>
  <text x="858" y="312" text-anchor="middle" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">WebSocket Relay Server</text>

  <rect x="748" y="332" width="220" height="28" rx="4" fill="#0a0a0f" stroke="#475569" stroke-width="0.5"/>
  <text x="858" y="350" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Push (FCM) | AI Vision | Auth</text>

  <!-- Pi to Cloud -->
  <path d="M 660 295 L 730 295" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="6,3"/>
  <g><rect x="670" y="276" width="60" height="18" rx="4" fill="#2a1f00" stroke="#eab308" stroke-width="0.5"/>
  <text x="700" y="289" text-anchor="middle" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">WS relay</text></g>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- MOBILE APP (bottom-right) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="730" y="436" width="256" height="130" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="858" y="464" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Mobile App (Remote)</text>
  <text x="858" y="486" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">iOS / Android | SporePrint Cloud</text>

  <rect x="748" y="500" width="220" height="26" rx="4" fill="#0a0a0f" stroke="#eab308" stroke-width="0.5"/>
  <text x="858" y="517" text-anchor="middle" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Premium: Cloud relay (zero-config)</text>

  <rect x="748" y="534" width="220" height="26" rx="4" fill="#0a0a0f" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="858" y="551" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Free: Tailscale VPN (self-setup)</text>

  <!-- Mobile to Cloud -->
  <path d="M 858 436 L 858 378" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="6,3"/>
  <g><rect x="864" y="400" width="72" height="18" rx="4" fill="#2a1f00" stroke="#eab308" stroke-width="0.5"/>
  <text x="900" y="413" text-anchor="middle" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Cloud relay</text></g>

  <!-- Mobile to Pi via Tailscale -->
  <path d="M 730 548 Q 680 548 680 380" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g><rect x="684" y="456" width="68" height="18" rx="4" fill="#2e1065" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="718" y="469" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Tailscale</text></g>


  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DATA FLOW SUMMARY (bottom) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="40" y="644" width="920" height="44" rx="6" fill="#111827" stroke="#475569" stroke-width="0.5"/>
  <text x="62" y="662" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Data Flow:</text>
  <text x="142" y="662" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">Sensors --> MQTT --> Pi (ingest, store, alert, automate) --> Web UI (live dashboard via Socket.IO)</text>
  <text x="62" y="680" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Commands:</text>
  <text x="142" y="680" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9">UI --> Pi --> MQTT --> ESP32 (fan speed, light level, plug on/off) | Camera POSTs images directly to Pi REST API</text>


  <!-- ═══════════════════════ FOOTER ═══════════════════════ -->
  <text x="500" y="698" text-anchor="middle" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="9">SporePrint v3.3.1  |  System Overview  |  github.com/59psi/SporePrint</text>

