listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Defense-in-depth: anonymous publish was the largest LAN attack surface
# (any device could drive actuators). Credentials + ACL + loopback binding
# scope broker access to the Pi itself and the firmware nodes that have
# registered credentials via setup.sh / captive portal.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf
