persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Defense-in-depth: anonymous publish was the largest LAN attack surface
# (any device could drive actuators). Credentials + ACL scope broker access
# to the Pi itself and the firmware nodes provisioned via setup.sh /
# captive portal.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

# ── Plaintext listener (1883) ───────────────────────────────────
# v4.2: published on the LAN — the previous compose file bound this to the
# host's loopback, which meant firmware nodes could never reach the broker
# at all. Credentials + ACL still gate it; prefer the TLS listener for new
# provisioning (the node portal's "Secure MQTT" toggle).
listener 1883

# ── TLS listener (8883) ─────────────────────────────────────────
# Certificates are generated by setup.sh into config/mosquitto/certs/ and
# mounted at /mosquitto/certs. Nodes pin the CA via trust-on-first-use:
# they fetch it once from the Pi's /api/provision/ca at provision time and
# verify the broker against it on every connection after.
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
