# Mosquitto ACL — who can publish/subscribe where.
#
# v3.4.9: split the previous single `server` user into three purpose-
# scoped accounts per industry least-privilege best practice. A compromise
# of any one credential no longer grants the whole broker. setup.sh +
# scripts/rotate-mqtt-creds.sh handle provisioning + rotation.
#
# Firmware nodes can publish telemetry/status/health/alert on their own
# namespace and subscribe only to their own cmd/* — they can never toggle
# a sibling node. That policy is unchanged.
#
# Bootstrap: if a user you add is not yet in the passwd file it simply
# cannot connect — no quiet escalation.

# ── sp-cmd: scoped command account for external tooling/scripts. ────
# (The Pi server itself connects as `server` below — one client, one
# account with the union of its needs.)
# READ telemetry/status/health/alert for the automation engine's event
# consumers; WRITE cmd/* to actuate nodes. Does NOT read or write outside
# the sporeprint/ namespace — shellies/* and tasmota/* are off-limits to
# this user so a compromise can't jump to a 3rd-party smart plug.
user sp-cmd
topic readwrite sporeprint/+/cmd
topic readwrite sporeprint/+/cmd/#
topic read sporeprint/+/telemetry
topic read sporeprint/+/telemetry/#
topic read sporeprint/+/status
topic read sporeprint/+/status/#
topic read sporeprint/+/health
topic read sporeprint/+/health/#
topic read sporeprint/+/alert
topic read sporeprint/+/alert/#
topic read sporeprint/+/ota

# ── sp-telemetry: read-only. For dashboards, Prometheus scrapers, ────
# debug tooling, ad-hoc mosquitto_sub sessions. CAN NOT publish anywhere.
# Rotation is cheap because this user never actuates anything.
user sp-telemetry
topic read sporeprint/#

# ── server: the Pi server process (the ONE client server/app/mqtt.py ─
# opens; setup.sh provisions this user). It subscribes to sporeprint/#
# plus both vendor-plug trees and publishes node commands and plug
# commands. This block was MISSING through v4.2.0 — with no `user server`
# section this account fell through to the pattern grants only
# (sporeprint/server/…), so every subscription and every command publish
# was silently denied: a freshly-provisioned Pi heard nothing and
# commanded nothing. Mosquitto denies without logging to the client, so
# only a live bench build would ever have surfaced it.
user server
topic read sporeprint/#
topic readwrite sporeprint/+/cmd
topic readwrite sporeprint/+/cmd/#
topic read shellies/#
topic read tasmota/#
topic write shellies/+/relay/0/command
topic write tasmota/+/cmnd/POWER

# ── sp-3p: the credential you configure INTO Shelly/Tasmota plugs. ───
# A plug must PUBLISH its state (shellies/<id>/relay/0, tasmota/<id>/
# stat/POWER, tele/SENSOR, LWT) and SUBSCRIBE to its command topic —
# the old grants were read-only on the state trees and write-granted
# topic shapes this codebase never uses (shellies/+/command/+,
# cmnd/tasmota_+/+ — Tasmota's %prefix%/%topic% order; we run
# %topic%/%prefix%), so a credentialed plug could neither report nor be
# commanded. One shared vendor-device account: per-device scoping is not
# possible with Tasmota's topic layout, and the trees are already
# isolated from sporeprint/#.
user sp-3p
topic readwrite shellies/#
topic readwrite tasmota/#

# ── Per-node users: created per node via scripts/add-node-mqtt-user.sh ─
# Each user's %u expands to the node_id so a relay-01 cred cannot write
# to climate-01's telemetry topic, and vice versa.
pattern readwrite sporeprint/%u/telemetry
pattern readwrite sporeprint/%u/telemetry/#
pattern readwrite sporeprint/%u/status
pattern readwrite sporeprint/%u/status/#
pattern readwrite sporeprint/%u/health
pattern readwrite sporeprint/%u/health/#
pattern readwrite sporeprint/%u/alert
pattern readwrite sporeprint/%u/alert/#
pattern readwrite sporeprint/%u/ota
pattern read sporeprint/%u/cmd
pattern read sporeprint/%u/cmd/#
