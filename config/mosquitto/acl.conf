# Mosquitto ACL — who can publish/subscribe where.
#
# The server user has full authority (publishes cmd/*, subscribes to everything).
# Firmware nodes can publish telemetry/status/health/alert on their own namespace
# and subscribe only to their own cmd/* — they can never toggle a sibling node.
#
# Bootstrap: setup.sh creates "server" and per-node credentials. If a node you
# add is not yet in the passwd file it simply cannot connect — no quiet escalation.

user server
topic readwrite #

pattern readwrite sporeprint/%u/telemetry
pattern readwrite sporeprint/%u/telemetry/#
pattern readwrite sporeprint/%u/status
pattern readwrite sporeprint/%u/status/#
pattern readwrite sporeprint/%u/health
pattern readwrite sporeprint/%u/health/#
pattern readwrite sporeprint/%u/alert
pattern readwrite sporeprint/%u/alert/#
pattern read sporeprint/%u/cmd
pattern read sporeprint/%u/cmd/#
